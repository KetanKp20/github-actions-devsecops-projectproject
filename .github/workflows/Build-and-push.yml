name: Build and Push

on:
    workflow_call:

jobs:
    buildandpush:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses : actions/checkout@v4

            - name: login to docker hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: build docker image
              uses: docker/build-push-action@v7
              with:
                context: .
                push: true
                tags : | 
                    ${{secrets.DOCKERHUB_USERNAME }}/github-actions-app:${{github.ref}}
                    ${{secrets.DOCKERHUB_USERNAME }}/github-actions-app:latest
                    ${{secrets.DOCKERHUB_USERNAME }}/github-actions-app:${{github.sha}}

